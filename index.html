<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Flipbook</title>

<link rel="stylesheet" href="pageflip.css">

<style>

body{
margin:0;
background:#111;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#book{
width:95vw;
height:95vh;
max-width:1400px;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
}

</style>

</head>

<body>

<div id="book"></div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

const pageFlip = new St.PageFlip(
document.getElementById("book"),
{
width:600,
height:900,

size:"stretch",       // tự fit màn hình
autoSize:true,

maxShadowOpacity:0.5,
showCover:true,

mobileScrollSupport:true,

usePortrait:true      // mobile hiển thị 1 trang
}
);

let pages=[];

for(let i=1;i<=20;i++){
pages.push(i+".png");
}

pageFlip.loadFromImages(pages);

</script>

</body>

</html>
